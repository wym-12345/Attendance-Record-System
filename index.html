<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> 研究生科研生活记录站</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root {
            --bg-color: #fff0f3;
            --sidebar-bg: #ffe5ec;
            --card-bg: #ffffff;
            --primary-pink: #ffb3c1;
            --dark-pink: #ff8fa3;
            --text-color: #594d4d;
            --accent-blue: #a2d2ff;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; display: flex; height: 100vh; overflow: hidden;
        }
        /* 左侧区域 */
        #sidebar {
            width: 200px; background-color: var(--sidebar-bg);
            border-right: 1px solid var(--primary-pink);
            display: flex; flex-direction: column; padding: 20px;
        }
        /* 右侧主区域布局 */
        #main-content {
            flex: 1; padding: 20px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 20px; align-items: center;
        }

        #main-content header { width: 95%; max-width: 1000px; text-align: center; margin-bottom: 20px; }

        .card { background: var(--card-bg); border-radius: 15px; padding: 15px; box-shadow: 0 4px 10px rgba(255,182,193,0.1); }
        h3 { margin-top: 0; color: var(--dark-pink); font-size: 1rem; border-bottom: 1px solid var(--bg-color); padding-bottom: 8px; }
         /* 第一横向模块：心情记录 */
        #mood-module { width: 95%; display: flex; gap: 15px; align-items: center; }
        .mood-inputs { flex: 1; }
        .mood-btns { display: flex; justify-content: center; margin-bottom: 10px; gap: 10px; }
        .mood-btn { 
            flex: none; width:100px; padding: 8px; font-size: 0.85rem; border: 1px solid var(--primary-pink); 
            background: white; border-radius: 20px; cursor: pointer; transition: all 0.3s;
        }
        .mood-btn:hover { background: var(--primary-pink); color: white; transform: translateY(-2px); }
        /* 第二横向模块：日历 + 打卡 */
        #work-module { width: 95%; display: grid; grid-template-columns: 300px 1fr; gap: 20px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; font-size: 0.8rem; }
        .cal-day { padding: 8px 0; background: #fff; border-radius: 5px; position: relative; cursor: pointer; border: 1px solid #fef0f0; }
        .cal-day:hover { background: var(--bg-color); }
        .has-data::after { content: '🌸'; position: absolute; bottom: 2px; right: 2px; font-size: 0.6rem; }

        .punch-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        textarea { width: 100%; border: 1px solid #eee; border-radius: 8px; padding: 8px; resize: none; font-size: 0.85rem; box-sizing: border-box; }
        .todo-item { display: flex; align-items: center; font-size: 0.85rem; margin-bottom: 4px; }
        .btn-main { background: var(--primary-pink); color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-main:hover { background: var(--dark-pink); }
    </style>
</head>
<body>

<aside id="sidebar">
<h2 style="font-size: 1rem; color: var(--dark-pink);" id="panel-title">科研站登录</h2>

<div id="auth-fields">
    <input type="text" id="username" placeholder="用户名" style="width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid var(--primary-pink); border-radius: 5px; box-sizing: border-box;">
    
    <div class="password-container" style="position: relative; margin-bottom: 10px;">
        <input type="password" id="pass-input" placeholder="输入密码(6位以上)..." 
                style="width: 100%; padding: 8px 30px 8px 10px; border: 1px solid var(--primary-pink); border-radius: 5px; box-sizing: border-box; outline: none;">
        <span id="toggle-eye" style="position: absolute; right: 8px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 0.9rem;">🙈</span>
    </div>
</div>

<button class="btn-main" id="auth-btn" style="width: 100%;">进入空间</button>
<p id="switch-auth-mode" style="font-size: 0.7rem; color: var(--dark-pink); cursor: pointer; text-align: center; margin-top: 10px;">没有账号？去注册</p>

<p style="font-size: 0.7rem; color: #999; margin-top: auto;">当前用户：<span id="user-display">未登录</span></p>
<p style="font-size: 0.7rem; color: #999;">数据状态：<span id="lock-status">已锁定 🔒</span></p>
</aside>

<main id="main-content">
    <header>
        <h1>🌸 研究生科研生活记录站</h1>
        <p id="current-time"></p>
    </header>
    
    <div id="mood-module" class="card">
        <div class="mood-inputs">
            <h3>🍹 心情随手记</h3>
            <div class="mood-btns">
                <button class="mood-btn" onclick="addMood('活力满满')">✨ 活力满满</button>
                <button class="mood-btn" onclick="addMood('淡如水')">💧 淡如水</button>
                <button class="mood-btn" onclick="addMood('身心疲惫')">🔋 身心疲惫</button>
                <button class="mood-btn" onclick="addMood('来杯奶茶')">🧋 来杯奶茶</button>
                <button class="mood-btn" onclick="addMood('努力搬砖')">🧱 努力搬砖</button>
            </div>
            <input type="text" id="quick-note" placeholder="此刻想说点什么？" style="width: 100%; padding: 8px; border: 1px solid #eee; border-radius: 5px; box-sizing: border-box;">
        </div>
        <button class="btn-main" onclick="saveMoodEntry()" style="height: 80px; width: 60px; margin-left: 10px;">保<br>存</button>
    </div>

    <div id="work-module">
        <div class="card" id="calendar-container">
            <h3>📅 考勤概览</h3>
            <div class="calendar-controls" style="display: flex; gap: 5px; justify-content: center; margin-bottom: 10px;">
                <select id="year-select" style="padding: 2px; border-radius: 4px; border: 1px solid var(--primary-pink);"></select>
                <select id="month-select" style="padding: 2px; border-radius: 4px; border: 1px solid var(--primary-pink);"></select>
            </div>
            <div class="calendar-grid" id="calendar-body"></div>
        </div>

        <div class="card">
            <h3>📝 <span id="target-date-label">今日操作区</span></h3>
            <div class="punch-grid">
                <div>
                    <p style="font-size: 0.8rem; margin: 0 0 5px 0;">🌅 上班计划</p>
                    <div style="display: flex; gap: 5px; margin-bottom: 10px;">
                        <input type="text" id="todo-input" style="flex: 1; padding: 5px;" placeholder="添加任务...">
                        <button onclick="addTodo()" class="btn-main">+</button>
                    </div>
                    <div id="todo-list" style="max-height: 120px; overflow-y: auto;"></div>
                    <button onclick="doCheckIn()" class="btn-main" style="width: 100%; margin-top: 10px;">上班打卡</button>
                </div>
                <div>
                    <p style="font-size: 0.8rem; margin: 0 0 5px 0;">🌙 下班总结</p>
                    <textarea id="summary-input" rows="5" placeholder="今天完成了哪些实验/论文？"></textarea>
                    <button onclick="doCheckOut()" class="btn-main" style="width: 100%; margin-top: 5px; background: var(--accent-blue);">下班打卡</button>
                </div>
            </div>
            <div style="margin-top: 15px; padding-top: 15px; border-top: 1px dashed #eee; display: flex; align-items: center; gap: 10px;">
                <p style="font-size: 0.8rem; margin: 0; white-space: nowrap;">📎 附件管理:</p>
                <input type="file" id="file-upload" style="font-size: 0.7rem; flex: 1;">
                <button onclick="uploadFile()" class="btn-main" style="font-size: 0.7rem; padding: 5px 10px;">上传文件记录</button>
            </div>
            <div id="daily-log-display" style="margin-top: 15px; font-size: 0.8rem; padding: 10px; background: #fafafa; border-radius: 8px;"></div>
        </div>
    </div>
</main>

<script>
    // --- 1. 全局变量声明 ---
    let isRegisterMode = false;
    let currentUser = "";
    let SECRET_KEY = ""; // 存储解密密钥
    let allData = {};    // 存储当前用户的所有数据
    let viewingDate = new Date().toISOString().split('T')[0]; 

    // 校验密码强度
    function isStrongPassword(pw) {
        return pw.length >= 6;
    }

    window.onload = () => {
        // 更新时钟
        setInterval(() => {
            const now = new Date();
            document.getElementById('current-time').innerText = now.toLocaleString();
        }, 1000);

        initCalendarControls();
        renderCalendar(); // 初始渲染空日历
        
        const authBtn = document.getElementById('auth-btn');
        const switchMode = document.getElementById('switch-auth-mode');
        
        // 切换注册/登录模式
        switchMode.onclick = () => {
            isRegisterMode = !isRegisterMode;
            document.getElementById('panel-title').innerText = isRegisterMode ? "新用户注册" : "科研站登录";
            authBtn.innerText = isRegisterMode ? "确认注册" : "进入空间";
            switchMode.innerText = isRegisterMode ? "已有账号？去登录" : "没有账号？去注册";
        };

        const passInput = document.getElementById('pass-input');
        const toggleEye = document.getElementById('toggle-eye');
        toggleEye.onclick = () => {
            if (passInput.type === "password") {
                passInput.type = "text"; toggleEye.innerText = "👁️";
            } else {
                passInput.type = "password"; toggleEye.innerText = "🙈";
            }
        };

        authBtn.onclick = handleAuth;
    };

    // --- 2. 身份验证逻辑 ---
    function handleAuth() {
        const user = document.getElementById('username').value.trim();
        const pass = document.getElementById('pass-input').value;

        if (!user || !pass) { alert("请填写完整信息！"); return; }
        if (!isStrongPassword(pass)) { alert("密码要求不少于6位！"); return; }

        const userKey = "user_config_" + user;
        const dataKey = "grad_data_" + user;

        if (isRegisterMode) {
            if (localStorage.getItem(userKey)) { alert("该用户名已存在！"); return; }
            localStorage.setItem(userKey, CryptoJS.SHA256(pass).toString());
            localStorage.setItem(dataKey, ""); 
            alert("注册成功！请切换到登录模式进入。");
            isRegisterMode = false;
            document.getElementById('switch-auth-mode').click();
        } else {
            const storedHash = localStorage.getItem(userKey);
            if (!storedHash || CryptoJS.SHA256(pass).toString() !== storedHash) {
                alert("用户名或密码错误！"); return;
            }

            // 登录成功
            SECRET_KEY = pass;
            currentUser = user;
            const raw = localStorage.getItem(dataKey);
            
            if (raw && raw.trim() !== "") {
                try {
                    const bytes = CryptoJS.AES.decrypt(raw, SECRET_KEY);
                    const decryptedText = bytes.toString(CryptoJS.enc.Utf8);
                    allData = JSON.parse(decryptedText);
                } catch(e) { 
                    console.error("解密失败:", e);
                    alert("数据解密失败，请检查密码！"); return; 
                }
            } else {
                allData = {};
            }

            // UI 状态转换
            document.getElementById('user-display').innerText = user;
            document.getElementById('lock-status').innerText = "已解锁 🔓";
            document.getElementById('auth-fields').style.display = "none";
            document.getElementById('auth-btn').style.display = "none";
            document.getElementById('switch-auth-mode').style.display = "none";
            
            switchDate(viewingDate);
        }
    }

    // --- 3. 数据持久化 ---
    function saveData() {
        if(!SECRET_KEY || !currentUser) return;
        const dataKey = "grad_data_" + currentUser;
        const ciphertext = CryptoJS.AES.encrypt(JSON.stringify(allData), SECRET_KEY).toString();
        localStorage.setItem(dataKey, ciphertext);
        renderCalendar();
    }

    // --- 4. 日历核心逻辑 ---
    function initCalendarControls() {
        const yearSelect = document.getElementById('year-select');
        const monthSelect = document.getElementById('month-select');
        const now = new Date();

        for (let i = now.getFullYear() - 2; i <= now.getFullYear() + 2; i++) {
            const opt = document.createElement('option');
            opt.value = i; opt.innerText = i + "年";
            if (i === now.getFullYear()) opt.selected = true;
            yearSelect.appendChild(opt);
        }
        for (let i = 1; i <= 12; i++) {
            const opt = document.createElement('option');
            opt.value = i - 1; opt.innerText = i + "月";
            if (i === now.getMonth() + 1) opt.selected = true;
            monthSelect.appendChild(opt);
        }
        yearSelect.onchange = renderCalendar;
        monthSelect.onchange = renderCalendar;
    }

    function renderCalendar() {
        const year = parseInt(document.getElementById('year-select').value);
        const month = parseInt(document.getElementById('month-select').value);
        const body = document.getElementById('calendar-body');
        
        // 清空并添加表头
        body.innerHTML = "";
        const weeks = ['日', '一', '二', '三', '四', '五', '六'];
        weeks.forEach(w => {
            const el = document.createElement('div');
            el.innerText = w;
            el.style.fontWeight = "bold";
            el.style.color = "var(--dark-pink)";
            body.appendChild(el);
        });

        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        // 填充空白
        for (let i = 0; i < firstDay; i++) {
            body.appendChild(document.createElement('div'));
        }

        // 填充日期
        for (let d = 1; d <= daysInMonth; d++) {
            const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const dayEl = document.createElement('div');
            dayEl.className = 'cal-day';
            dayEl.innerText = d;
            
            if (allData[dateStr]) dayEl.classList.add('has-data');
            if (dateStr === viewingDate) dayEl.style.border = '2px solid var(--dark-pink)';
            
            dayEl.onclick = () => switchDate(dateStr);
            body.appendChild(dayEl);
        }
    }

    // --- 5. 交互逻辑 ---
    function switchDate(date) {
        viewingDate = date;
        document.getElementById('target-date-label').innerText = date + " 操作区";
        
        const dayData = allData[date] || { checkIn: "", checkOut: "", moods: [], todos: [], summary: "", files: [] };
        
        // 更新日志显示
        document.getElementById('daily-log-display').innerHTML = `
            <div><b>上班：</b>${dayData.checkIn || '--'} | <b>下班：</b>${dayData.checkOut || '--'}</div>
            <div style="margin-top:5px; color:#888; font-size:0.75rem;">
                ${dayData.moods ? dayData.moods.map(m => `[${m.type}]`).join(' ') : '暂无心情'}
            </div>
        `;

        // 刷新待办列表
        const todoList = document.getElementById('todo-list');
        todoList.innerHTML = "";
        (dayData.todos || []).forEach((t, i) => {
            const item = document.createElement('div');
            item.className = 'todo-item';
            item.innerHTML = `
                <input type="checkbox" ${t.done?'checked':''} onchange="toggleTodo(${i})"> 
                <span style="${t.done?'text-decoration:line-through;color:#ccc':''}">${t.text}</span>
            `;
            todoList.appendChild(item);
        });

        document.getElementById('summary-input').value = dayData.summary || "";
        renderCalendar(); 
    }

    // 操作函数组
    function addMood(type) { window.selectedMood = type; }

    function saveMoodEntry() {
        if(!currentUser) { alert("请先登录！"); return; }
        const note = document.getElementById('quick-note').value;
        if(!allData[viewingDate]) allData[viewingDate] = { checkIn: "", checkOut: "", moods: [], todos: [], summary: "", files: [] };
        allData[viewingDate].moods.push({ 
            type: window.selectedMood || '🧱 努力搬砖', 
            note: note, 
            time: new Date().toLocaleTimeString() 
        });
        document.getElementById('quick-note').value = "";
        saveData(); switchDate(viewingDate);
    }

    function doCheckIn() {
        if(!currentUser) return alert("请先登录！");
        if(!allData[viewingDate]) allData[viewingDate] = { checkIn: "", checkOut: "", moods: [], todos: [], summary: "", files: [] };
        allData[viewingDate].checkIn = new Date().toLocaleTimeString();
        saveData(); switchDate(viewingDate);
    }

    function doCheckOut() {
        if(!currentUser) return alert("请先登录！");
        if(!allData[viewingDate]) allData[viewingDate] = { checkIn: "", checkOut: "", moods: [], todos: [], summary: "", files: [] };
        allData[viewingDate].checkOut = new Date().toLocaleTimeString();
        allData[viewingDate].summary = document.getElementById('summary-input').value;
        saveData(); switchDate(viewingDate);
        alert("辛苦了，总结已保存！");
    }

    function addTodo() {
        const input = document.getElementById('todo-input');
        if(!input.value || !currentUser) return;
        if(!allData[viewingDate]) allData[viewingDate] = { checkIn: "", checkOut: "", moods: [], todos: [], summary: "", files: [] };
        allData[viewingDate].todos.push({ text: input.value, done: false });
        input.value = "";
        saveData(); switchDate(viewingDate);
    }

    function toggleTodo(index) {
        allData[viewingDate].todos[index].done = !allData[viewingDate].todos[index].done;
        saveData(); switchDate(viewingDate);
    }

    function uploadFile() {
        if(!currentUser) return;
        const fileInput = document.getElementById('file-upload');
        const file = fileInput.files[0];
        if (!file) return;
        if(!allData[viewingDate]) allData[viewingDate] = { checkIn: "", checkOut: "", moods: [], todos: [], summary: "", files: [] };
        if(!allData[viewingDate].files) allData[viewingDate].files = [];
        allData[viewingDate].files.push(`${file.name} (${new Date().toLocaleTimeString()})`);
        saveData(); switchDate(viewingDate);
        fileInput.value = "";
    }
</script>

</body>
